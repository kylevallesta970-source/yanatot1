<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday my Yanatot!</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #ffe6f0;
    overflow: hidden;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    text-align: center;
  }

  h1 {
    margin-top: 50px;
    color: #ff3399;
    font-size: 4em;
    text-shadow: 2px 2px #fff;
  }

  p {
    font-size: 1.5em;
    color: #ff66b2;
  }

  /* Small falling images */
  .falling-image {
    position: absolute;
    width: 50px;
    pointer-events: none;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(-100px); opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
  }

  /* Big floating image */
  #bigImage {
    position: absolute;
    width: 250px;
    left: 50%;
    transform: translateX(-50%);
    top: -300px;
    animation: bigFall 6s linear infinite, sway 2s ease-in-out infinite alternate;
  }

  @keyframes bigFall {
    0% { top: -300px; opacity: 0; transform: translateX(-50%) scale(1); }
    10% { opacity: 1; }
    100% { top: 100vh; opacity: 0; transform: translateX(-50%) scale(1.1); }
  }

  @keyframes sway {
    0% { transform: translateX(-60%) rotate(-5deg); }
    50% { transform: translateX(-40%) rotate(5deg); }
    100% { transform: translateX(-50%) rotate(0deg); }
  }
</style>
</head>
<body>

<!-- Background music -->
<audio autoplay loop>
  <source src="happy-birthday.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<h1>🎉 Happy Birthday, my baby! 🎉</h1>
<p>Mwaaaaaaaaaaaaaaaaaaaaaaaa!</p>

<!-- Big floating image -->
<img id="bigImage" src="yanatot-big.jpg" alt="Birthday Image">

<script>
  // Small falling images
  const images = [
    'yanatot1.jpg', 'yanatot2.jpg', 'yanatot3.jpg',
    'yanatot4.jpg', 'yanatot5.jpg', 'yanatot6.jpg',
    'yanatot7.jpg', 'yanatot8.jpg'
  ]; 
  const numberOfImages = 20;

  for (let i = 0; i < numberOfImages; i++) {
    let img = document.createElement('img');
    img.src = images[Math.floor(Math.random() * images.length)];
    img.classList.add('falling-image');
    img.style.left = Math.random() * window.innerWidth + 'px';
    img.style.animationDuration = 3 + Math.random() * 5 + 's';
    img.style.animationDelay = Math.random() * 5 + 's';
    document.body.appendChild(img);
  }
</script>

</body>
</html>
